name: Poristiwa Auto-Aggregator

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Run Aggregator
        run: node scripts/aggregate.js

      # --- DEBUG STEP: SEE THE FILES ---
      - name: Audit Generated Data
        run: |
          echo "Checking if JSON files exist..."
          ls -R src/data/articles || echo "FOLDER NOT FOUND"
      # ---------------------------------

      - name: Astro Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: 'poristiwa'
          directory: 'dist'

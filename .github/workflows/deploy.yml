name: Poristiwa Auto-Aggregator

on:
  schedule:
    - cron: '0 * * * *' # Runs exactly at the top of every hour
  workflow_dispatch: # Allows you to click a button to force a manual run

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Brute Aggregate & Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: 'poristiwa' # Your Cloudflare Pages project name
          directory: 'dist' # Astro's static output folder
